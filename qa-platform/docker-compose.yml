services:
  postgres:
    image: postgres:16
    container_name: qa-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qa_platform
    ports:
      - '5434:5432'
    volumes:
      - qa-platform-db-data:/var/lib/postgresql/data

volumes:
  qa-platform-db-data:
